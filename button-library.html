<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Library — Current Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="buttons.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-0:     #f3f3f4;
      --black-80: #333333;
      --black-60: #666666;
      --black-50: #808080;
      --black-12: #e0e0e0;
      --black-8:  #ebebeb;
      --black-4:  #f5f5f5;
      --white:    #ffffff;
      --sidebar-w: 400px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg-0);
      min-height: 100vh;
      padding: 48px 40px;
      transition: padding-right 0.3s ease;
    }

    body.sidebar-open {
      padding-right: calc(var(--sidebar-w) + 40px);
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--black-80);
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: var(--black-50);
      margin-bottom: 40px;
    }

    /* ── Table ── */
    .lib-table {
      display: flex;
      flex-direction: column;
      background: var(--white);
      border: 0.5px solid var(--black-12);
      border-radius: 16px;
      overflow: hidden;
      max-width: 560px;
    }

    .lib-row {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 24px;
      border-bottom: 0.5px solid var(--black-8);
      cursor: pointer;
      transition: background 0.1s;
    }
    .lib-row:last-child { border-bottom: none; }
    .lib-row:hover { background: var(--black-4); }
    .lib-row.active { background: #eff6ff; }

    .lib-name {
      font-size: 11px;
      color: var(--black-50);
      font-family: 'SF Mono', 'Fira Code', monospace;
      min-width: 200px;
      flex-shrink: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--white);
      border-left: 0.5px solid var(--black-12);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      overflow: hidden;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--black-8);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--black-80);
    }

    .sidebar-variant {
      font-size: 11px;
      color: var(--black-50);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-top: 2px;
    }

    .close-btn {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: none;
      background: var(--black-8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--black-60);
      font-size: 14px;
      line-height: 1;
    }
    .close-btn:hover { background: var(--black-12); }

    /* Preview strip */
    .sidebar-preview {
      padding: 24px 20px;
      border-bottom: 0.5px solid var(--black-8);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-0);
      flex-shrink: 0;
      min-height: 80px;
    }

    /* Code block */
    .sidebar-code {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .sidebar-code pre {
      margin: 0;
      padding: 20px;
      font-size: 12px;
      line-height: 1.6;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--white) !important;
      border-radius: 0;
    }

    .sidebar-code code {
      font-family: inherit;
    }

    /* Copy button */
    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 20px 20px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 0.5px solid var(--black-12);
      background: var(--white);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: var(--black-60);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .copy-btn:hover { background: var(--black-4); }
    .copy-btn.copied { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }
  </style>
</head>
<body>

  <h1>Button / Primary</h1>
  <p class="subtitle">Current Design System · 5 variants · click any row to see code</p>

  <div class="lib-table">

    <div class="lib-row" data-variant="s1">
      <span class="lib-name">Symbol 1</span>
      <button class="btn btn--s1" aria-label="Search" tabindex="-1">
        <div class="btn__icon-wrap">
          <div class="btn__icon-inner">
            <div class="btn__icon-vector">
              <img src="https://www.figma.com/api/mcp/asset/24e95713-ebba-4c1e-8350-c3c3400ff1fc" alt="">
            </div>
          </div>
        </div>
      </button>
    </div>

    <div class="lib-row" data-variant="s2">
      <span class="lib-name">Symbol 2</span>
      <button class="btn btn--s2" aria-label="Search options" tabindex="-1">
        <div class="btn__icon-group">
          <div class="btn__icon-wrap">
            <div class="btn__icon-inner">
              <div class="btn__icon-vector">
                <img src="https://www.figma.com/api/mcp/asset/8ffdfdc1-8efd-4701-b4e9-9beebcfcd10a" alt="">
              </div>
            </div>
          </div>
          <div class="btn__icon-wrap">
            <div class="btn__icon-inner">
              <div class="btn__icon-vector">
                <img src="https://www.figma.com/api/mcp/asset/8ffdfdc1-8efd-4701-b4e9-9beebcfcd10a" alt="">
              </div>
            </div>
          </div>
        </div>
      </button>
    </div>

    <div class="lib-row" data-variant="s3">
      <span class="lib-name">Symbol 3</span>
      <button class="btn btn--s3" aria-label="Three actions" tabindex="-1">
        <div class="btn__icon-group">
          <div class="btn__icon-wrap">
            <div class="btn__icon-inner">
              <div class="btn__icon-vector">
                <img src="https://www.figma.com/api/mcp/asset/0eaa7c4c-3c3d-4e9e-ae9a-38f744f5a7a3" alt="">
              </div>
            </div>
          </div>
          <div class="btn__icon-wrap">
            <div class="btn__icon-inner">
              <div class="btn__icon-vector">
                <img src="https://www.figma.com/api/mcp/asset/0eaa7c4c-3c3d-4e9e-ae9a-38f744f5a7a3" alt="">
              </div>
            </div>
          </div>
          <div class="btn__icon-wrap">
            <div class="btn__icon-inner">
              <div class="btn__icon-vector">
                <img src="https://www.figma.com/api/mcp/asset/0eaa7c4c-3c3d-4e9e-ae9a-38f744f5a7a3" alt="">
              </div>
            </div>
          </div>
        </div>
      </button>
    </div>

    <div class="lib-row" data-variant="label">
      <span class="lib-name">Symbol + Text</span>
      <button class="btn btn--label" tabindex="-1">
        <div class="btn__icon-slot btn__icon-slot--magnifying-glass">
          <div class="btn__icon-vector">
            <img src="https://www.figma.com/api/mcp/asset/7f862942-cd10-48bf-adc1-5d9f7314254e" alt="">
          </div>
        </div>
        <span class="btn__label">Label</span>
      </button>
    </div>

    <div class="lib-row" data-variant="label-trail">
      <span class="lib-name">Symbol + Text + Symbol</span>
      <button class="btn btn--label-trail" tabindex="-1">
        <div class="btn__icon-slot btn__icon-slot--magnifying-glass">
          <div class="btn__icon-vector">
            <img src="https://www.figma.com/api/mcp/asset/b928c189-fd56-4565-82a3-efc7d15863ec" alt="">
          </div>
        </div>
        <span class="btn__label">Label</span>
        <div class="btn__icon-slot btn__icon-slot--chevron-down">
          <div class="btn__icon-vector">
            <img src="https://www.figma.com/api/mcp/asset/d63db395-ed01-4c96-ac4f-85060d8e09af" alt="">
          </div>
        </div>
      </button>
    </div>

  </div>

  <!-- ── Sidebar ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-title">React</div>
        <div class="sidebar-variant" id="sidebar-variant-label"></div>
      </div>
      <button class="close-btn" id="close-btn">✕</button>
    </div>
    <div class="sidebar-preview" id="sidebar-preview"></div>
    <div class="sidebar-code">
      <pre><code class="language-jsx" id="sidebar-code-block"></code></pre>
    </div>
    <button class="copy-btn" id="copy-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="#808080" stroke-width="1"/><path d="M4.5 9.5H3A1.5 1.5 0 0 1 1.5 8V3A1.5 1.5 0 0 1 3 1.5H8A1.5 1.5 0 0 1 9.5 3v1.5" stroke="#808080" stroke-width="1" stroke-linecap="round"/></svg>
      Copy code
    </button>
  </div>

  <script>
    const SEARCH_ICON = 'searchIcon';
    const CHEVRON_ICON = 'chevronIcon';

    const variants = {
      s1: {
        label: 'Symbol 1',
        preview: document.querySelector('[data-variant="s1"] .btn').outerHTML,
        code: `import searchIcon from './icons/search.svg';

function Button() {
  return (
    <button className="btn btn--s1" aria-label="Search">
      <div className="btn__icon-wrap">
        <div className="btn__icon-inner">
          <div className="btn__icon-vector">
            <img src={searchIcon} alt="" />
          </div>
        </div>
      </div>
    </button>
  );
}`
      },
      s2: {
        label: 'Symbol 2',
        code: `import searchIcon from './icons/search.svg';

function Button() {
  return (
    <button className="btn btn--s2" aria-label="Search options">
      <div className="btn__icon-group">
        <div className="btn__icon-wrap">
          <div className="btn__icon-inner">
            <div className="btn__icon-vector">
              <img src={searchIcon} alt="" />
            </div>
          </div>
        </div>
        <div className="btn__icon-wrap">
          <div className="btn__icon-inner">
            <div className="btn__icon-vector">
              <img src={searchIcon} alt="" />
            </div>
          </div>
        </div>
      </div>
    </button>
  );
}`
      },
      s3: {
        label: 'Symbol 3',
        code: `import searchIcon from './icons/search.svg';

function Button() {
  return (
    <button className="btn btn--s3" aria-label="Three actions">
      <div className="btn__icon-group">
        {[0, 1, 2].map(i => (
          <div className="btn__icon-wrap" key={i}>
            <div className="btn__icon-inner">
              <div className="btn__icon-vector">
                <img src={searchIcon} alt="" />
              </div>
            </div>
          </div>
        ))}
      </div>
    </button>
  );
}`
      },
      label: {
        label: 'Symbol + Text',
        code: `import searchIcon from './icons/search.svg';

function Button({ label = 'Label' }) {
  return (
    <button className="btn btn--label">
      <div className="btn__icon-slot btn__icon-slot--magnifying-glass">
        <div className="btn__icon-vector">
          <img src={searchIcon} alt="" />
        </div>
      </div>
      <span className="btn__label">{label}</span>
    </button>
  );
}`
      },
      'label-trail': {
        label: 'Symbol + Text + Symbol',
        code: `import searchIcon from './icons/search.svg';
import chevronIcon from './icons/chevron-down.svg';

function Button({ label = 'Label' }) {
  return (
    <button className="btn btn--label-trail">
      <div className="btn__icon-slot btn__icon-slot--magnifying-glass">
        <div className="btn__icon-vector">
          <img src={searchIcon} alt="" />
        </div>
      </div>
      <span className="btn__label">{label}</span>
      <div className="btn__icon-slot btn__icon-slot--chevron-down">
        <div className="btn__icon-vector">
          <img src={chevronIcon} alt="" />
        </div>
      </div>
    </button>
  );
}`
      }
    };

    // Capture previews after DOM is ready
    document.querySelectorAll('.lib-row').forEach(row => {
      variants[row.dataset.variant].preview = row.querySelector('.btn').outerHTML;
    });

    const sidebar = document.getElementById('sidebar');
    const codeBlock = document.getElementById('sidebar-code-block');
    const previewEl = document.getElementById('sidebar-preview');
    const variantLabel = document.getElementById('sidebar-variant-label');
    const closeBtn = document.getElementById('close-btn');
    const copyBtn = document.getElementById('copy-btn');
    let activeRow = null;

    function openSidebar(variant, row) {
      const v = variants[variant];
      variantLabel.textContent = v.label;
      previewEl.innerHTML = v.preview;
      codeBlock.textContent = v.code;
      hljs.highlightElement(codeBlock);
      sidebar.classList.add('open');
      document.body.classList.add('sidebar-open');
      if (activeRow) activeRow.classList.remove('active');
      activeRow = row;
      row.classList.add('active');
      copyBtn.textContent = 'Copy code';
      copyBtn.className = 'copy-btn';
      copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="#808080" stroke-width="1"/><path d="M4.5 9.5H3A1.5 1.5 0 0 1 1.5 8V3A1.5 1.5 0 0 1 3 1.5H8A1.5 1.5 0 0 1 9.5 3v1.5" stroke="#808080" stroke-width="1" stroke-linecap="round"/></svg> Copy code`;
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      document.body.classList.remove('sidebar-open');
      if (activeRow) { activeRow.classList.remove('active'); activeRow = null; }
    }

    document.querySelectorAll('.lib-row').forEach(row => {
      row.addEventListener('click', () => {
        if (activeRow === row && sidebar.classList.contains('open')) {
          closeSidebar();
        } else {
          openSidebar(row.dataset.variant, row);
        }
      });
    });

    closeBtn.addEventListener('click', closeSidebar);

    copyBtn.addEventListener('click', () => {
      const variant = activeRow?.dataset.variant;
      if (!variant) return;
      navigator.clipboard.writeText(variants[variant].code).then(() => {
        copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 3" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!`;
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="#808080" stroke-width="1"/><path d="M4.5 9.5H3A1.5 1.5 0 0 1 1.5 8V3A1.5 1.5 0 0 1 3 1.5H8A1.5 1.5 0 0 1 9.5 3v1.5" stroke="#808080" stroke-width="1" stroke-linecap="round"/></svg> Copy code`;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>
</body>
</html>
