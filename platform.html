<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design System — Internal Platform</title>
  <!-- Font: Circular Std — loaded via tokens.css @font-face or Adobe Fonts kit.
       Fallback to Inter (Google Fonts) until Circular Std is hosted. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- Single global stylesheet (tokens → icons → buttons → lender-portal). Regenerate: npm run build -->
  <link rel="stylesheet" href="design-system/css/global.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans, 'Inter', -apple-system, sans-serif);
      background: var(--accent-bg-0);
      color: var(--accent-black-80);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ══ LEFT NAV ══ */
    .nav {
      width: 200px;
      min-width: 200px;
      height: 100vh;
      background: var(--accent-bg-0);
      display: flex;
      flex-direction: column;
      padding: 20px 12px 12px;
      gap: 2px;
      border-right: 0.5px solid var(--accent-black-12);
    }
    .nav-title { font-size: 12px; font-weight: 500; color: var(--accent-black-80); padding: 0 8px 4px; letter-spacing: -0.1px; }
    .nav-byline { font-size: 10px; font-weight: 400; color: var(--accent-black-50); padding: 0 8px 14px; line-height: 1.35; letter-spacing: 0.01px; }
    .nav-section { font-size: 10px; font-weight: 500; color: var(--accent-black-50); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 8px 4px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; font-size: 12px; font-weight: 400; color: var(--accent-black-60); cursor: pointer; user-select: none; transition: background 0.1s; }
    .nav-item:hover { background: var(--accent-black-8); }
    .nav-item.active { background: var(--accent-white-100); color: var(--accent-black-80); font-weight: 500; border: 0.5px solid var(--accent-black-12); }
    .nav-icon { width: 16px; height: 16px; opacity: 0.5; flex-shrink: 0; }
    .nav-item.active .nav-icon { opacity: 1; }

    /* ══ COLLAPSIBLE NAV GROUP ══ */
    .nav-group--spaced { margin-top: 8px; }
    .nav-section--collapsible { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; border-radius: 6px; padding: 8px 8px 4px; transition: background 0.1s; }
    .nav-section--collapsible:hover { background: var(--accent-black-8); }
    .nav-collapse-chevron { width: 12px; height: 12px; color: var(--accent-black-50); flex-shrink: 0; }
    .nav-chevron-wrap { display: flex; align-items: center; transition: transform 0.18s ease; }
    .nav-chevron-wrap.is-collapsed { transform: rotate(-90deg); }
    .nav-group-items { display: flex; flex-direction: column; gap: 2px; overflow: hidden; transition: opacity 0.15s; }
    .nav-group-items--hidden { display: none; }

    /* ══ MAIN ══ */
    .main { flex: 1; min-width: 0; height: 100vh; overflow-y: auto; transition: padding-right 0.25s ease; }
    .main.panel-open { padding-right: 460px; }
    .main-inner { padding: 32px 40px; }

    /* ══ SECTION HEADER ══ */
    .section-header { margin-bottom: 28px; }
    .section-title { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
    .section-subtitle { font-size: 12px; color: var(--accent-black-50); margin-top: 4px; }

    /* ══ PAGE ══ */
    .page { display: none; }
    .page.active { display: block; }

    /* ══ TABLE ══ */
    .ds-table { background: var(--accent-white-100); border: 0.5px solid var(--accent-black-12); border-radius: 16px; overflow: hidden; max-width: 640px; }
    .ds-row { display: flex; align-items: center; padding: 14px 20px; gap: 20px; border-bottom: 0.5px solid var(--accent-black-8); cursor: pointer; transition: background 0.1s; }
    .ds-row:last-child { border-bottom: none; }
    .ds-row:hover { background: var(--accent-black-4); }
    .ds-row.active { background: #eff6ff; }
    .ds-row-name { font-size: 11px; color: var(--accent-black-50); font-family: 'SF Mono','Fira Code',monospace; }

    /* ══ TOKENS ══ */
    .token-grid { display: flex; flex-direction: column; gap: 32px; max-width: 640px; }
    .token-group-title { font-size: 11px; font-weight: 500; color: var(--accent-black-50); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .token-list { background: var(--accent-white-100); border: 0.5px solid var(--accent-black-12); border-radius: 16px; overflow: hidden; }
    .token-row { display: flex; align-items: center; gap: 16px; padding: 12px 20px; border-bottom: 0.5px solid var(--accent-black-8); cursor: pointer; transition: background 0.1s; }
    .token-row:last-child { border-bottom: none; }
    .token-row:hover { background: var(--accent-black-4); }
    .token-row.active { background: #eff6ff; }
    .token-swatch { width: 32px; height: 32px; border-radius: 8px; border: 0.5px solid var(--accent-black-12); flex-shrink: 0; }
    .token-info { flex: 1; min-width: 0; }
    .token-figma-name { font-size: 12px; font-weight: 500; }
    .token-css-name { font-size: 11px; color: var(--accent-black-50); font-family: 'SF Mono','Fira Code',monospace; margin-top: 1px; }
    .token-hex { font-size: 11px; color: var(--accent-black-50); font-family: 'SF Mono','Fira Code',monospace; flex-shrink: 0; }

    /* ══ ICON ROW ══ */
    .icon-row-preview { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-black-4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* ══ CODE PANEL ══ */
    .panel {
      position: fixed; top: 0; right: 0;
      width: 460px; height: 100vh;
      background: var(--accent-white-100);
      border-left: 0.5px solid var(--accent-black-12);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      z-index: 100;
    }
    .panel.open { transform: translateX(0); }

    .panel-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--accent-black-8);
      flex-shrink: 0;
    }
    .panel-type { font-size: 10px; font-weight: 500; color: var(--accent-black-50); text-transform: uppercase; letter-spacing: 0.5px; }
    .panel-name { font-size: 14px; font-weight: 500; color: var(--accent-black-80); margin-top: 2px; letter-spacing: -0.1px; }
    .panel-close { width: 24px; height: 24px; border-radius: 6px; border: none; background: var(--accent-black-8); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--accent-black-60); font-size: 13px; flex-shrink: 0; }
    .panel-close:hover { background: var(--accent-black-12); }

    /* ══ RELATIONSHIP GRAPH ══ */
    .panel-relations { padding: 14px 20px 16px; border-bottom: 0.5px solid var(--accent-black-8); background: var(--accent-white-100); flex-shrink: 0; }
    .rel-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
    .rel-section-label { font-size: 10px; font-weight: 500; color: var(--accent-black-80); text-transform: uppercase; letter-spacing: 0.5px; }
    .rel-section-desc { font-size: 10px; color: var(--accent-black-40); }
    .rel-graph { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .rel-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .rel-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 8px; border: 0.5px solid var(--accent-black-12); background: var(--accent-white-100); font-size: 11px; font-weight: 500; color: var(--accent-black-60); white-space: nowrap; font-family: inherit; }
    .rel-chip--link { cursor: pointer; transition: background 0.1s, border-color 0.1s, color 0.1s; }
    .rel-chip--link:hover { background: var(--accent-black-4); border-color: var(--accent-black-20); color: var(--accent-black-80); }
    .rel-chip--self { background: var(--accent-black-8); color: var(--accent-black-80); border-color: var(--accent-black-20); cursor: default; }
    .rel-role { font-size: 9px; font-weight: 500; color: var(--accent-black-40); text-transform: uppercase; letter-spacing: 0.4px; text-align: center; }
    .rel-role--self { color: var(--accent-black-60); }
    .rel-arrow { display: flex; align-items: center; color: var(--accent-black-30); flex-shrink: 0; padding-bottom: 14px; }

    .panel-preview { padding: 32px 24px; border-bottom: 0.5px solid var(--accent-black-8); display: flex; align-items: center; justify-content: center; background: var(--accent-bg-0); min-height: 140px; flex-shrink: 0; }

    .panel-tabs {
      display: flex; align-items: center; gap: 2px;
      padding: 8px 12px;
      border-bottom: 0.5px solid var(--accent-black-8);
      flex-shrink: 0; overflow-x: auto;
    }
    .panel-tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 5px 10px; border-radius: 6px; border: none;
      background: transparent; font-size: 11px; font-weight: 500;
      font-family: 'Inter', sans-serif; color: var(--accent-black-50);
      cursor: pointer; white-space: nowrap; transition: background 0.1s, color 0.1s;
    }
    .tab-btn:hover { background: var(--accent-black-8); color: var(--accent-black-80); }
    .tab-btn.active { background: var(--accent-black-8); color: var(--accent-black-80); }

    .panel-code-wrap { flex: 1; overflow-y: auto; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .panel-code-wrap pre { margin: 0; padding: 20px; font-size: 12px; line-height: 1.65; font-family: 'SF Mono','Fira Code',monospace; background: var(--accent-white-100) !important; }
    .panel-code-wrap code { font-family: inherit; }

    .panel-copy {
      display: flex; align-items: center; gap: 6px;
      margin: 0 20px 20px; padding: 8px 14px;
      border-radius: 8px; border: 0.5px solid var(--accent-black-12);
      background: var(--accent-white-100);
      font-size: 12px; font-family: 'Inter',sans-serif;
      color: var(--accent-black-60); cursor: pointer;
      flex-shrink: 0; transition: background 0.1s;
    }
    .panel-copy:hover { background: var(--accent-black-4); }
    .panel-copy.copied { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }
    .copy-icon { width: 14px; height: 14px; flex-shrink: 0; }

    /* ══ PANEL COMMENTS (real-time via Firebase Firestore when configured) ══ */
    .panel-comments {
      flex-shrink: 0;
      max-height: 32vh;
      min-height: 0;
      border-top: 0.5px solid var(--accent-black-8);
      background: var(--accent-bg-0);
      display: flex;
      flex-direction: column;
    }
    .panel-comments.is-hidden { display: none !important; }
    .panel-comments-inner { display: flex; flex-direction: column; min-height: 0; padding: 12px 16px 16px; gap: 10px; }
    .panel-comments-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .panel-comments-live {
      font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
      color: #15803d; background: #dcfce7; padding: 2px 8px; border-radius: 100px;
    }
    .panel-comments-local {
      font-size: 9px; font-weight: 500; color: var(--accent-black-40); max-width: 200px; line-height: 1.35; text-align: right;
    }
    .panel-comments-thread {
      flex: 1; min-height: 72px; max-height: 140px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
      background: var(--accent-white-100);
      border: 0.5px solid var(--accent-black-12);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .panel-comments-empty { font-size: 11px; color: var(--accent-black-40); padding: 4px 0; }
    .panel-comment { padding-bottom: 8px; border-bottom: 0.5px solid var(--accent-black-8); }
    .panel-comment:last-child { border-bottom: none; padding-bottom: 0; }
    .panel-comment-meta { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .panel-comment-author { font-size: 11px; font-weight: 600; color: var(--accent-black-80); }
    .panel-comment-at { font-size: 9px; color: var(--accent-black-40); flex-shrink: 0; }
    .panel-comment-text { font-size: 11px; line-height: 1.45; color: var(--accent-black-60); white-space: pre-wrap; word-break: break-word; }
    .panel-comments-form { display: flex; flex-direction: column; gap: 8px; }
    .panel-comments-name {
      width: 100%; padding: 8px 10px; border-radius: 8px; border: 0.5px solid var(--accent-black-12);
      background: var(--accent-white-100); font-size: 11px; font-family: inherit; color: var(--accent-black-80);
      outline: none; box-sizing: border-box;
    }
    .panel-comments-name:focus { border-color: var(--accent-black-30); }
    .panel-comments-text {
      width: 100%; padding: 8px 10px; border-radius: 10px; border: 0.5px solid var(--accent-black-12);
      background: var(--accent-white-100); font-size: 11px; line-height: 1.4; font-family: inherit;
      color: var(--accent-black-80); resize: vertical; min-height: 52px; outline: none; box-sizing: border-box;
    }
    .panel-comments-text:focus { border-color: var(--accent-black-30); }
    .panel-comments-submit {
      align-self: flex-start; padding: 6px 14px; border-radius: 8px; border: 0.5px solid var(--accent-black-12);
      background: var(--accent-white-100); font-size: 11px; font-weight: 500; font-family: inherit;
      color: var(--accent-black-80); cursor: pointer; transition: background 0.1s;
    }
    .panel-comments-submit:hover { background: var(--accent-black-4); }

    /* ══ NAV SEARCH ══ */
    #nav-body { flex: 1; min-height: 0; overflow-y: auto; }
    #nav-body::-webkit-scrollbar { display: none; }
    .nav-search-wrap { position: relative; padding-top: 10px; border-top: 0.5px solid var(--accent-black-8); margin-top: 4px; flex-shrink: 0; }
    .nav-search-bar { display: flex; align-items: center; padding: 4px; background: var(--accent-white-100); border: 0.5px solid var(--accent-black-12); border-radius: 100px; cursor: text; transition: border-color 0.15s; gap: 0; }
    .nav-search-bar:focus-within { border-color: var(--accent-black-30); }
    .nav-search-icon { width: 28px; height: 28px; border-radius: 100px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav-search-input { flex: 1; border: none; background: transparent; outline: none; font-size: 11px; font-family: inherit; color: var(--accent-black-60); padding: 0 8px 0 2px; min-width: 0; }
    .nav-search-input::placeholder { color: var(--accent-black-60); }
    .nav-search-results { position: absolute; bottom: calc(100% + 6px); left: 0; right: 0; background: var(--accent-white-100); border: 0.5px solid var(--accent-black-12); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 200; max-height: 280px; overflow-y: auto; }
    .nav-search-result { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; border-bottom: 0.5px solid var(--accent-black-4); transition: background 0.1s; }
    .nav-search-result:last-child { border-bottom: none; }
    .nav-search-result:hover, .nav-search-result.focused { background: var(--accent-black-4); }
    .nav-search-result-type { font-size: 9px; font-weight: 500; color: var(--accent-black-40); text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; min-width: 54px; }
    .nav-search-result-label { font-size: 11px; font-weight: 500; color: var(--accent-black-80); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-search-empty { padding: 14px 12px; font-size: 11px; color: var(--accent-black-40); text-align: center; }

    /* ══ GLOBAL CSS PAGE ══ */
    .global-css-intro { font-size: 12px; color: var(--accent-black-60); max-width: 720px; line-height: 1.55; margin-bottom: 16px; }
    .global-css-actions { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .global-css-btn {
      padding: 8px 14px; border-radius: 8px; border: 0.5px solid var(--accent-black-12);
      background: var(--accent-white-100); font-size: 11px; font-weight: 500; font-family: inherit;
      color: var(--accent-black-80); cursor: pointer; transition: background 0.1s;
    }
    .global-css-btn:hover { background: var(--accent-black-4); }
    .global-css-error { font-size: 12px; color: #b45309; margin-bottom: 12px; display: none; max-width: 640px; line-height: 1.45; }

    /* ── In-code search bar ── */
    .global-css-search-wrap {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; max-width: min(960px, 100%);
    }
    .global-css-search-bar {
      display: flex; align-items: center; gap: 6px;
      flex: 1; padding: 4px 4px 4px 12px;
      background: var(--accent-white-100);
      border: 0.5px solid var(--accent-black-12);
      border-radius: 100px; transition: border-color 0.15s;
    }
    .global-css-search-bar:focus-within { border-color: var(--accent-black-30); }
    .global-css-search-input {
      flex: 1; border: none; background: transparent; outline: none;
      font-size: 11px; font-family: inherit; color: var(--accent-black-80);
      min-width: 0;
    }
    .global-css-search-input::placeholder { color: var(--accent-black-40); }
    .global-css-search-count {
      font-size: 10px; font-weight: 500; color: var(--accent-black-40);
      white-space: nowrap; padding-right: 4px; flex-shrink: 0;
    }
    .global-css-search-count.has-results { color: var(--accent-black-60); }
    .global-css-search-nav {
      display: flex; gap: 2px; flex-shrink: 0;
    }
    .global-css-search-nav-btn {
      width: 28px; height: 28px; border-radius: 100px;
      border: 0.5px solid var(--accent-black-12);
      background: var(--accent-white-100); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-black-60); font-size: 13px;
      transition: background 0.1s; flex-shrink: 0;
    }
    .global-css-search-nav-btn:hover { background: var(--accent-black-4); }
    .global-css-search-nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* Highlighted matches inside the code block */
    .global-css-pre mark {
      background: #fef08a; color: inherit;
      border-radius: 2px; padding: 0 1px;
    }
    .global-css-pre mark.active {
      background: #f97316; color: #fff;
    }

    .global-css-pre-wrap {
      background: var(--accent-white-100); border: 0.5px solid var(--accent-black-12); border-radius: 12px;
      overflow: hidden; max-width: min(960px, 100%);
    }
    .global-css-pre { margin: 0; padding: 16px; max-height: min(70vh, 720px); overflow: auto; font-size: 10px; line-height: 1.45; }
    .global-css-pre code { font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace; white-space: pre; word-break: normal; }
  </style>
</head>
<body>

  <!-- ══ NAV — populated by platform.js from SYSTEM.nav ══ -->
  <nav class="nav">
    <div class="nav-title">Design System</div>
    <div class="nav-byline">Created and Managed by Anagh</div>
    <div id="nav-body"></div>
    <div class="nav-search-wrap">
      <div class="nav-search-results" id="nav-search-results" style="display:none"></div>
      <div class="nav-search-bar" id="nav-search-bar">
        <div class="nav-search-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#666666" stroke-width="1.25"/><path d="M9.5 9.5L12 12" stroke="#666666" stroke-width="1.25" stroke-linecap="round"/></svg>
        </div>
        <input class="nav-search-input" id="nav-search-input" placeholder="Search" type="text" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </nav>

  <!-- ══ MAIN — pages injected by platform.js ══ -->
  <div class="main" id="main">
    <div class="main-inner" id="pages-container"></div>
  </div>

  <!-- ══ CODE PANEL — always the same structure ══ -->
  <div class="panel" id="panel">
    <div class="panel-header">
      <div><div class="panel-type" id="panel-type"></div><div class="panel-name" id="panel-name"></div></div>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div id="panel-relations" style="display:none"></div>
    <div class="panel-preview" id="panel-preview"></div>
    <div class="panel-tabs" id="panel-tabs"></div>
    <div class="panel-code-wrap" id="panel-code-wrap"></div>
    <button class="panel-copy" id="panel-copy">
      <svg class="copy-icon" viewBox="0 0 14 14" fill="none"><rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="#808080" stroke-width="1"/><path d="M4.5 9.5H3A1.5 1.5 0 0 1 1.5 8V3A1.5 1.5 0 0 1 3 1.5H8A1.5 1.5 0 0 1 9.5 3v1.5" stroke="#808080" stroke-width="1" stroke-linecap="round"/></svg>
      Copy code
    </button>
    <div id="panel-comments" class="panel-comments is-hidden" aria-live="polite"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="comments-realtime.js"></script>
  <script src="system.js"></script>
  <script src="platform.js"></script>
</body>
</html>
